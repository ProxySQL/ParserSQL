name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        compiler: [g++, clang++]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        env:
          CXX: ${{ matrix.compiler }}
        run: make -f Makefile.new clean && make -f Makefile.new all

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: make -f Makefile.new clean && make -f Makefile.new all
